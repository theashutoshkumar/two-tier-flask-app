apiVersion: v1
kind: Pod
metadata:
  name: flask-app
  labels:
    app: flask-app
spec:
  containers: 
  - name: flask-app
    image: ashutoshkumarmahanta/flask-app:latest
    env:
      - name: MYSQL_HOST
        value: "mysql"  #this is mysql service cluster IP address
      - name: MYSQL_USER
        value: "admin"
      - name: MYSQL_PASSWORD
        value: "admin"
      - name: MYSQL_DB
        value: "myDb"
    ports:
    - containerPort: 5000
    imagePullPolicy: Always
